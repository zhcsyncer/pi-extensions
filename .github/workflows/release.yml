name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set up npm trusted publishing client
        run: npm install --global npm@11.18.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate packages
        run: pnpm check

      - name: Create version PR or publish packages
        id: changesets
        uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0 # v1.9.0
        with:
          version: pnpm version-packages
          publish: pnpm release
          createGithubReleases: false
          commit: "chore: version packages"
          title: "chore: version packages"
          commitMode: github-api

      - name: Reconcile package tags and repository release
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISHED_THIS_RUN: ${{ steps.changesets.outputs.published }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          RECAP_VERSION=$(node -p "require('./packages/pi-recap/package.json').version")
          INTENT_VERSION=$(node -p "require('./packages/pi-tool-display-intent/package.json').version")
          if [[ "$VERSION" != "$RECAP_VERSION" || "$VERSION" != "$INTENT_VERSION" ]]; then
            echo "Package versions diverged: root=$VERSION recap=$RECAP_VERSION intent=$INTENT_VERSION" >&2
            exit 1
          fi

          for PACKAGE in @zhcsyncer/pi-extensions @zhcsyncer/pi-recap @zhcsyncer/pi-tool-display-intent; do
            for ATTEMPT in {1..12}; do
              PUBLISHED_VERSION=$(npm view "$PACKAGE@$VERSION" version 2>/dev/null || true)
              if [[ "$PUBLISHED_VERSION" == "$VERSION" ]]; then
                break
              fi

              if [[ "$PUBLISHED_THIS_RUN" != "true" ]]; then
                echo "$PACKAGE@$VERSION is not published; skipping GitHub release reconciliation."
                exit 0
              fi

              if [[ "$ATTEMPT" == "12" ]]; then
                echo "$PACKAGE@$VERSION did not become visible on npm in time." >&2
                exit 1
              fi

              echo "Waiting for $PACKAGE@$VERSION to become visible on npm (attempt $ATTEMPT/12)..."
              sleep 5
            done
          done

          REPO_TAG="v$VERSION"
          RECAP_TAG="@zhcsyncer/pi-recap@$VERSION"
          INTENT_TAG="@zhcsyncer/pi-tool-display-intent@$VERSION"
          TAGS=(
            "@zhcsyncer/pi-extensions@$VERSION"
            "$RECAP_TAG"
            "$INTENT_TAG"
            "$REPO_TAG"
          )
          PUSH_TAGS=false

          for TAG in "${TAGS[@]}"; do
            if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
              if ! git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
                git tag "$TAG"
              fi
              PUSH_TAGS=true
            fi
          done

          if [[ "$PUSH_TAGS" == "true" ]]; then
            git push origin --tags
          fi

          if ! gh release view "$REPO_TAG" >/dev/null 2>&1; then
            gh release create "$REPO_TAG" \
              --verify-tag \
              --generate-notes \
              --title "pi-extensions $REPO_TAG"
          fi

          if ! gh release view "$RECAP_TAG" >/dev/null 2>&1; then
            RECAP_NOTES=$(awk -v version="$VERSION" '
              $0 == "## " version { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' packages/pi-recap/CHANGELOG.md)
            if [[ -z "$RECAP_NOTES" ]]; then
              RECAP_NOTES="Release @zhcsyncer/pi-recap@$VERSION"
            fi

            gh release create "$RECAP_TAG" \
              --verify-tag \
              --latest=false \
              --notes "$RECAP_NOTES" \
              --title "pi-recap v$VERSION"
          fi

          if ! gh release view "$INTENT_TAG" >/dev/null 2>&1; then
            INTENT_NOTES=$(awk -v version="$VERSION" '
              $0 == "## " version { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' packages/pi-tool-display-intent/CHANGELOG.md)
            if [[ -z "$INTENT_NOTES" ]]; then
              INTENT_NOTES="Release @zhcsyncer/pi-tool-display-intent@$VERSION"
            fi

            gh release create "$INTENT_TAG" \
              --verify-tag \
              --latest=false \
              --notes "$INTENT_NOTES" \
              --title "pi-tool-display-intent v$VERSION"
          fi
