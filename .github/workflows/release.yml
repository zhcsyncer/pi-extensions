name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Set up npm trusted publishing client
        run: npm install --global npm@11.18.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate packages
        run: pnpm check

      - name: Create version PR or publish packages
        id: changesets
        uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0 # v1.9.0
        env:
          # Temporary fallback for the first publish of a new package; remove it
          # after @zhcsyncer/pi-glance has a trusted publisher configured.
          NPM_BOOTSTRAP_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN || secrets.NPM_TOKEN }}
        with:
          version: pnpm version-packages
          publish: bash scripts/publish-packages.sh
          createGithubReleases: false
          commit: "chore: version packages"
          title: "chore: version packages"
          commitMode: github-api

      - name: Reconcile package tags and repository release
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISHED_THIS_RUN: ${{ steps.changesets.outputs.published }}
        run: bash scripts/reconcile-release.sh
